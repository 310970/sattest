name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: shopkart-automation

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Start ShopKart
        run: docker run -d --name shopkart -p 8080:8080 ghcr.io/ust-sdet/shopkart:stable

      - name: Wait for ShopKart
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8080/api/health > /dev/null; then
              echo "ShopKart is ready"
              exit 0
            fi
            sleep 2
          done

          docker logs shopkart
          exit 1

      - name: Run Gradle Tests
        run: gradle test --no-daemon -Dprofile=ci
        env:
          SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
          SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
          SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}