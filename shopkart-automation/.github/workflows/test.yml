name: Run ShopKart tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3 # v4.4.2

      - name: Start ShopKart
        run: docker run --detach --name shopkart -p 8080:8080 ghcr.io/ust-sdet/shopkart:stable

      - name: Wait for ShopKart
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8080/api/products >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs shopkart
          exit 1

      - name: Run tests
        run: gradle test --no-daemon -Dprofile=ci
        env:
          SHOPKART_ALICE_PASSWORD: ${{ secrets.SHOPKART_ALICE_PASSWORD }}
          SHOPKART_BOB_PASSWORD: ${{ secrets.SHOPKART_BOB_PASSWORD }}
          SHOPKART_CAROL_PASSWORD: ${{ secrets.SHOPKART_CAROL_PASSWORD }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/
            build/test-results/
            build/allure-results/
          if-no-files-found: ignore
